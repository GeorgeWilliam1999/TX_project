# GEN-4 (physical kappa, v8r1 field, pointing population) — 2026-06-11
# =============================================================================
# P0.2 ablation ARM (paper Phase A2): lambda_pde = lambda_ic = 0 — PURE DATA.
# Matched pair with pinn_v2_lam0_2M_cpu.yaml — identical except lambda_pde/ic.
# Also serves as the 2M no-kick control the project lacked (small_v1 was 200k).
# =============================================================================
seed: 42
data_path: /data/bfys/gscriven/TrackExtrapolation/experiments/gen_3/data/train_10M_gen4.npz
max_samples: 2000000
train_fraction: 0.8
val_fraction: 0.1

model_type: pinn_v2
hidden_dims: [96, 96]
activation: tanh
dropout: 0.0
lambda_pde: 0.0
lambda_ic: 0.0
n_collocation: 2
physics_warmup_epochs: 10

kick_scaled_head: false
pde_scale_mode: legacy

batch_size: 2048
epochs: 60
learning_rate: 0.0005
weight_decay: 0.0001
warmup_epochs: 5
grad_clip: 1.0
patience: 25
min_delta: 1.0e-7

loss: log_cosh
checkpoint_dir: /data/bfys/gscriven/TrackExtrapolation/experiments/gen_3/trained_models
experiment_name: pinn_v2_g4_lam0_2M_cpu
use_mlflow: true
mlflow_experiment_name: gen_3_track_extrapolation
device: cpu
num_workers: 2
pin_memory: false
